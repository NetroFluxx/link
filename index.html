<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Definitely Not a Scam</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
    background:#111827;
    color:white;
}

.bg span{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#5865F2;
    animation:float 10s linear infinite;
}

@keyframes float{
    from{transform:translateY(110vh);}
    to{transform:translateY(-10vh);}
}

.card{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:450px;
    background:rgba(35,39,42,.92);
    padding:30px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

h1{
    margin:0;
    color:#5865F2;
}

button{
    margin-top:25px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:10px;
    background:#5865F2;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.02);
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="card">
<h1>🎁 Totally Legit Prize Generator</h1>

<p>
Congratulations! You've found the world's most trustworthy prize button.*
</p>

<p><strong>*Results may be musically surprising.</strong></p>

<button onclick="window.location='https://www.youtube.com/watch?v=dQw4w9WgXcQ'">
Claim Your Prize
</button>

<p style="margin-top:20px;font-size:12px;color:#aaa;">
This page is a joke.
</p>
</div>

<script>
const bg=document.querySelector(".bg");

for(let i=0;i<80;i++){
    const s=document.createElement("span");
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(5+Math.random()*8)+"s";
    s.style.animationDelay=Math.random()*8+"s";
    bg.appendChild(s);
}
</script>

</body>
</html>
